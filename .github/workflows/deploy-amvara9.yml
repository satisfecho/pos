# Deploy to amvara9 when master (or main) is updated.
# Requires repository secret: SSH_PRIVATE_KEY (private key for root@amvara9, base64-encoded to preserve newlines).
# Optional: DEPLOY_HOST (default 167.235.138.59), DEPLOY_USER (default root).

name: Deploy to amvara9

on:
  push:
    branches: [master, main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          KEY="${{ secrets.SSH_PRIVATE_KEY }}"
          # If secret looks like base64 (no PEM markers), decode it; otherwise use as raw key
          if echo "$KEY" | grep -q "BEGIN.*PRIVATE KEY"; then
            echo "$KEY" > ~/.ssh/deploy_key
          else
            echo "$KEY" | tr -d '\n\r' | base64 -d > ~/.ssh/deploy_key
          fi
          chmod 600 ~/.ssh/deploy_key
          ssh-keygen -y -f ~/.ssh/deploy_key > /dev/null || (echo "Invalid SSH key in SSH_PRIVATE_KEY secret. Use the raw private key (with -----BEGIN/END----- lines) or its base64 encoding (base64 -w 0 keyfile)."; exit 1)
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST || '167.235.138.59' }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy on amvara9
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST || '167.235.138.59' }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER || 'root' }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || '/development/pos2' }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new -o ServerAliveInterval=60 -o ServerAliveCountMax=10 \
            "${DEPLOY_USER}@${DEPLOY_HOST}" "cd ${DEPLOY_PATH} && git fetch origin && git checkout master && git pull origin master && bash -s" < scripts/deploy-amvara9.sh
