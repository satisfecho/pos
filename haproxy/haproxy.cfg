global
    log stdout format raw local0
    maxconn 4096
    # Do not use "daemon" in Docker; process must stay in foreground

defaults
    log global
    mode http
    option httplog
    option dontlognull
    timeout connect 5000ms
    timeout client 50000ms
    timeout server 50000ms
    option forwardfor

# Frontend: 80 and 443 for production (HAProxy terminates end-user requests);
# 4202 for development only (no root, no conflict with other services).
# SSL on 443: certificate(s) from /etc/haproxy/certs (mounted from host ./certbot/haproxy-certs; see certbot/README.md).
frontend http_frontend
    bind *:80
    bind *:443 ssl crt /etc/haproxy/certs
    bind *:4202
    mode http
    # Redirect HTTP to HTTPS when request came in on 80 (optional; remove if you want HTTP only)
    redirect scheme https code 301 if !{ ssl_fc } !{ path_beg /.well-known/acme-challenge }
    
    # App WebSocket - only route /ws path to ws-bridge
    acl is_app_ws path_beg /ws
    use_backend ws_backend if is_app_ws
    
    # API requests - route to backend
    acl is_api path_beg /api
    use_backend api_backend if is_api
    
    # Everything else (including Vite HMR WebSocket) - route to frontend
    default_backend frontend_backend

# Backend for WebSocket connections
backend ws_backend
    mode http
    balance roundrobin
    option httpchk GET /health
    http-check expect status 200
    # Remove /ws prefix from path (e.g., /ws/tenant/1 -> /tenant/1, /ws/table/token -> /table/token)
    # Note: regsub pattern matches /ws/ at start and replaces with /
    http-request set-path %[path,regsub(^/ws/,/)]
    server ws1 pos-ws-bridge:8021 check

# Backend for API requests
backend api_backend
    mode http
    balance roundrobin
    option httpchk GET /docs
    http-check expect status 200
    # Remove /api prefix from path
    http-request set-path %[path,regsub(^/api/,/)]
    server api1 pos-back:8020 check

# Backend for frontend static files
backend frontend_backend
    mode http
    balance roundrobin
    # Health check with Host header for Angular dev server
    option httpchk GET /
    http-check send hdr Host localhost
    http-check expect status 200
    # Add Host header for frontend server
    http-request set-header Host localhost
    server front1 pos-front:80 check
