services:
  front:
    build:
      context: ./front
      dockerfile: Dockerfile.prod
      args:
        COMMIT_HASH: ${COMMIT_HASH:-}
    container_name: pos-front
    restart: unless-stopped
    # No host port in prod: HAProxy terminates all end-user traffic on 80/443
    environment:
      - API_URL=${API_URL:-/api}
      - WS_URL=${WS_URL:-}
    depends_on:
      - db
      - redis
      - ws-bridge
      - back

  # Production: HAProxy is the single entry point for end users (80 + 443)
  # Mount combined PEM from certbot/haproxy-certs (same path used for certbot on amvara9; survives deploy)
  haproxy:
    volumes:
      - ./certbot/haproxy-certs:/etc/haproxy/certs:ro
    ports:
      - "80:80"
      - "443:443"
