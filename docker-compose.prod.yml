services:
  front:
    build:
      context: ./front
      dockerfile: Dockerfile.prod
    container_name: pos-front
    restart: unless-stopped
    # No host port in prod: HAProxy terminates all end-user traffic on 80/443
    environment:
      - API_URL=${API_URL:-/api}
      - WS_URL=${WS_URL:-}
    depends_on:
      - db
      - redis
      - ws-bridge
      - back

  # Production: HAProxy is the single entry point for end users (80 + 443)
  haproxy:
    ports:
      - "80:80"
      - "443:443"
