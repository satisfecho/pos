      (function () {
        var base = document.querySelector('base');

          return;

        var langs = { es: 1, ca: 1, en: 1, fr: 1, de: 1, it: 1, pt: 1 };
        var parts = window.location.pathname.split('/').filter(Boolean);

      })();
